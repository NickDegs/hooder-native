# XcodeGen yapılandırması → tek komutla .xcodeproj üretir.
#   brew install xcodegen
#   xcodegen generate
#   open Hooder.xcodeproj
#
# NOT: Mapbox SDK indirmesi için ~/.netrc'de secret download token (Downloads:Read)
# olmalı. Public token aşağıda MBXAccessToken'a yazılır (kendi pk.* token'ınla değiştir).
name: Hooder
options:
  bundleIdPrefix: com.realvirtuality
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"             # Swift 5 dil modu (iOS 26 SDK + @Observable çalışır)
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"      # CI build sırasında timestamp ile değiştirilir
    DEVELOPMENT_TEAM: SZF4T3P583
    TARGETED_DEVICE_FAMILY: "1"       # yalnız iPhone

packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios
    from: "11.0.0"

targets:
  Hooder:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: .
        excludes:
          - "*.md"
          - "*.yml"
          - "*.xml"
          - ".gitignore"
          - "LICENSE"
          - "fastlane"
          - ".github"
          - "Info.plist"
    dependencies:
      - package: MapboxMaps
    # Info.plist'i XcodeGen üretir → ITSAppUsesNonExemptEncryption GERÇEK Boolean
    # (false) olur → Apple "şifreleme/export compliance" maili kesilir.
    # Konum İZNİ ANAHTARI YOK → GPS sorulmaz.
    info:
      path: Info.plist
      properties:
        # Sürüm/build numarası build setting'lerden gelsin (CI timestamp ile günceller)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        # iPhone yalnız portre; iPad doğrulaması için iPad'e tüm yönelimler (iPhone-only app)
        UISupportedInterfaceOrientations~iphone: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        # Mapbox public token (CI'da pk.PUBLIC_TOKEN_BURAYA → gerçek token ile değiştirilir)
        MBXAccessToken: pk.PUBLIC_TOKEN_BURAYA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.realvirtuality.landlord
        GENERATE_INFOPLIST_FILE: "NO"
